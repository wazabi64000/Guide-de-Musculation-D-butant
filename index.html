<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0B0B0C" />
  <meta name="description" content="Guide de musculation débutant — suivi de séances, timer et statistiques." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Muscu Débutant</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/variables.css?v=22" />
  <link rel="stylesheet" href="css/style.css?v=22" />
  <link rel="stylesheet" href="css/animations.css?v=22" />
  <link rel="stylesheet" href="css/responsive.css?v=22" />
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">M</div>
        <div>
          <div class="brand-title">Muscu Débutant</div>
          <div class="brand-sub">Split 4 jours · Force</div>
        </div>
      </div>
    </header>

    <h1 class="greeting fade-in" id="greeting">Bonjour</h1>
    <p class="quote fade-in" id="quote">Chargement…</p>

    <section class="grid-stats fade-in" aria-label="Résumé">
      <article class="stat-card">
        <div class="stat-label">Séances</div>
        <div class="stat-value" id="stat-sessions">0</div>
      </article>
      <article class="stat-card">
        <div class="stat-label">Temps total</div>
        <div class="stat-value" id="stat-time">0 min</div>
      </article>
      <article class="stat-card">
        <div class="stat-label">Calories</div>
        <div class="stat-value" id="stat-calories">0 kcal</div>
      </article>
      <article class="stat-card">
        <div class="stat-label">Progression</div>
        <div class="stat-value" id="stat-progress">0%</div>
      </article>
    </section>

    <section class="card fade-in">
      <h2 class="card-title">Programme du jour</h2>
      <p class="card-text" id="program-label">Guide de Musculation Débutant</p>
      <p class="card-text" id="program-sub" style="margin-top:0.45rem">Séance du jour</p>
      <div class="progress-bar" style="margin:1.15rem 0">
        <div class="progress-fill" id="home-progress-fill"></div>
      </div>
      <button class="btn btn-primary" type="button" id="btn-start">Commencer la séance</button>
      <button class="btn btn-secondary" type="button" id="btn-open-program" style="width:100%;margin-top:0.85rem">Voir le programme</button>
    </section>

    <section class="card fade-in">
      <h2 class="card-title">Dernière séance</h2>
      <p class="card-text" id="last-session">Aucune séance pour le moment</p>
    </section>
  </main>

  <script type="module" src="js/app.js?v=22"></script>
</body>
</html>
