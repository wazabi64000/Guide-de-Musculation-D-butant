<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0B1220" />
  <title>Statistiques — Muscu Débutant</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/style.css?v=12" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/responsive.css?v=11" />
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">M</div>
        <div>
          <div class="brand-title">Statistiques</div>
          <div class="brand-sub">Progression & records</div>
        </div>
      </div>
    </header>

    <h1 class="greeting">Statistiques</h1>
    <p class="quote">Suivi de ton volume d'entraînement.</p>

    <section class="grid-stats">
      <article class="stat-card">
        <div class="stat-label">Temps total</div>
        <div class="stat-value" id="stat-total-time">0</div>
      </article>
      <article class="stat-card">
        <div class="stat-label">Séances</div>
        <div class="stat-value" id="stat-total-sessions">0</div>
      </article>
      <article class="stat-card">
        <div class="stat-label">Calories</div>
        <div class="stat-value" id="stat-total-calories">0</div>
      </article>
      <article class="stat-card">
        <div class="stat-label">Progression</div>
        <div class="stat-value" id="stat-progression">0%</div>
      </article>
    </section>

    <section class="card">
      <h2 class="card-title">7 derniers jours</h2>
      <div class="chart-wrap">
        <canvas id="stats-chart" width="640" height="220" aria-label="Graphique des minutes d'entraînement"></canvas>
      </div>
    </section>

    <section class="card">
      <h2 class="card-title">Records personnels</h2>
      <div class="records-list" id="records-list"></div>
    </section>
  </main>

  <script type="module" src="js/app.js?v=17"></script>
</body>
</html>
